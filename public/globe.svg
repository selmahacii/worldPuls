<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="50%" style="stop-color:#0c1929"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Glow -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#glowGrad)" stroke-width="1" opacity="0.3"/>
  <!-- Globe -->
  <circle cx="50" cy="50" r="42" fill="url(#globeGrad)" stroke="#60a5fa" stroke-width="1" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="50" cy="35" rx="36" ry="10" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="50" cy="65" rx="36" ry="10" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
  <!-- Longitude line -->
  <ellipse cx="50" cy="50" rx="14" ry="42" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>
  <!-- Data points -->
  <circle cx="35" cy="40" r="2" fill="#60a5fa"/>
  <circle cx="65" cy="55" r="2" fill="#a855f7"/>
  <circle cx="55" cy="35" r="1.5" fill="#fbbf24"/>
  <circle cx="45" cy="60" r="1.5" fill="#22c55e"/>
</svg>
